[profile.default]
src           = "src"
out           = "out"
libs          = ["lib"]
test          = "test"
solc_version  = "0.8.27"
optimizer     = true
optimizer_runs = 200
via_ir        = true
remappings    = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length  = 100
tab_width    = 4
bracket_spacing = true

[fuzz]
runs = 256
